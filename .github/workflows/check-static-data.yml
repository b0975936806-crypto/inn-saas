name: Check Static Data
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check-static-data:
    runs-on: ubuntu-latest
    name: Check for Mock/Hardcoded Data (Report Mode)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for mock/fallback data keywords
        run: |
          echo "🔍 檢查靜態資料關鍵字..."
          if grep -rn "mockData\|fakeData\|fallbackData\|假資料\|静态资料" \
            apps/admin/src/ apps/web/src/ 2>/dev/null; then
            echo ""
            echo "⚠️ 警告：發現靜態資料關鍵字！"
            echo "   新功能必須移除，舊程式碼請在 3/16 前清理完畢"
            echo ""
            # 暫時不阻擋，3/16 後啟用：exit 1
          else
            echo "✅ 無靜態資料關鍵字"
          fi

      - name: Check for hardcoded dashboard values
        run: |
          echo "🔍 檢查硬編碼儀表板數值..."
          if grep -rn "totalBookings:\|totalRevenue:\|occupancyRate:\|totalGuests:" \
            apps/admin/src/ apps/web/src/ 2>/dev/null; then
            echo ""
            echo "⚠️ 警告：發現硬編碼數值！這些資料必須來自 API"
            echo "   請在 3/16 前修正，之後將阻擋 PR"
            echo ""
            # 暫時不阻擋，3/16 後啟用：exit 1
          else
            echo "✅ 無硬編碼儀表板數值"
          fi

      - name: Check for generate mock functions
        run: |
          echo "🔍 檢查假資料生成函數..."
          if grep -rn "generateMock\|generateData\|generateRevenue\|createFake" \
            apps/admin/src/ apps/web/src/ 2>/dev/null; then
            echo ""
            echo "⚠️ 警告：發現假資料生成函數！請移除"
            echo ""
            # 暫時不阻擋，3/16 後啟用：exit 1
          else
            echo "✅ 無假資料生成函數"
          fi

      - name: Summary
        run: |
          echo ""
          echo "========================================"
          echo "📋 CI 檢查報告（報告模式 - 3/16 後改為阻擋模式）"
          echo "========================================"
          echo ""
          echo "⚠️ 重要提醒："
          echo "1. 新功能 PR 必須無靜態資料"
          echo "2. 舊程式碼請在 3/16 前清理完畢"
          echo "3. 3/16 後 CI 將阻擋含有靜態資料的 PR"
          echo ""
          echo "📋 測試員驗收清單："
          echo "1. 斷網測試：關閉網路後刷新頁面，不應顯示任何資料"
          echo "2. API 失敗測試：修改 API URL 為錯誤地址，應顯示錯誤訊息而非資料"
          echo ""
